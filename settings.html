<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zzoomm Performance Tracker - Settings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root { 
            --primary: #e6007e; --primary-hover: #b80064; --dark: #0f172a; 
            --light: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0; --text-main: #0f172a; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--light); color: var(--text-main); min-height: 100vh; padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        .btn-back { background: var(--dark); color: white; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card h2 { font-size: 1.2rem; margin-bottom: 1rem; border-left: 4px solid var(--primary); padding-left: 0.5rem; }
        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.35rem; }
        label { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        input, select { padding: 0.65rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 0.65rem 1.25rem; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-primary:hover { background: var(--primary-hover); }
        .toast-notify { display: none; padding: 1rem; border-radius: 8px; font-weight: 600; background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-flex">
            <h1>⚙️ Application Settings</h1>
            <a href="index.html" class="btn-back">← Back to Dashboard</a>
        </div>

        <div id="toastNotification" class="toast-notify">Action completed successfully.</div>

        <div class="card">
            <h2>🎨 Appearance & Preferences</h2>
            <div class="form-group">
                <label>Theme Preference</label>
                <select id="themeSelect" onchange="saveThemePreference()">
                    <option value="light">Light Theme</option>
                    <option value="dark">Dark Theme</option>
                </select>
            </div>
        </div>

        <div id="superuserSecurityCard" class="card" style="display: none;">
            <h2>🔒 Security & Access Controls (Superuser)</h2>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;">Force a specific user to change their password upon their next login attempt.</p>
            
            <div class="form-group">
                <label>Agent / User Name</label>
                <input type="text" id="targetResetUser" placeholder="e.g. Jane Smith">
            </div>
            <button class="btn-primary" onclick="triggerForcePasswordReset()">Flag User for Mandatory Reset</button>
        </div>
    </div>

    <script>
        const currentUser = sessionStorage.getItem("activeUser");
        const currentRole = sessionStorage.getItem("activeRole");

        if (!currentUser) { window.location.href = "login.html"; }

        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('themePreference') || 'light';
            document.getElementById("themeSelect").value = savedTheme;

            // Show Security Controls only to Superusers
            if (currentRole === "Superuser") {
                document.getElementById("superuserSecurityCard").style.display = "block";
            }
        });

        function saveThemePreference() {
            const theme = document.getElementById("themeSelect").value;
            localStorage.setItem('themePreference', theme);
            triggerToast("Theme preference updated.");
        }

        async function triggerForcePasswordReset() {
            const targetUser = document.getElementById("targetResetUser").value.trim();
            if (!targetUser) return alert("Please enter an agent or username.");

            const client = window.supabaseClient || window.supabase;
            if (client && typeof client.from === 'function') {
                const { error } = await client
                    .from('agent_stats')
                    .update({ must_change_password: true })
                    .ilike('agent_name', targetUser);

                if (!error) {
                    triggerToast(`Flagged ${targetUser} to change password on next logon.`);
                    document.getElementById("targetResetUser").value = "";
                } else {
                    alert("Failed to update user flag. Please verify the user exists.");
                }
            }
        }

        function triggerToast(msg) {
            const t = document.getElementById("toastNotification");
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 4000);
        }
    </script>
</body>
</html>
