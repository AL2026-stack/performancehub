<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zzoomm Performance Tracker</title>
    <style>
        :root { 
            --primary: #e6007e; 
            --primary-hover: #b80064; 
            --dark: #0f172a; 
            --light: #f8fafc; 
            --card-bg: #ffffff; 
            --border: #e2e8f0; 
            --danger: #ef4444;
            --text-main: #0f172a; 
        }
        
        body.dark-mode { 
            --light: #0f172a; 
            --dark: #f4f7fa; 
            --card-bg: #1e293b; 
            --text-main: #f1f5f9; 
            --border: #334155; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--light); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s; 
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.1);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .login-header p {
            font-size: 0.88rem;
            color: #64748b;
        }

        .error-alert-box {
            background: #fee2e2;
            color: var(--danger);
            border: 1px solid #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            background: var(--card-bg);
            color: var(--text-main);
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--primary);
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.95rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .login-tips {
            font-size: 0.82rem;
            color: #64748b;
            background: var(--light);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h1>Zzoomm Performance Tracker</h1>
        <p>Sign in to access your operational portal</p>
    </div>

    <div id="errorAlert" class="error-alert-box">
        Incorrect username or password.
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="usernameInput">Username / Name</label>
            <input type="text" id="usernameInput" placeholder="e.g. Admin" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">Sign In to Dashboard</button>
    </form>

    <div class="login-tips">
        🔑 <strong>Configured Demo Accounts:</strong><br>
        • <strong>Admin</strong> (Pass: <code>admin123</code>) → Superuser<br>
        • <strong>Supervisor</strong> (Pass: <code>super123</code>) → Supervisor<br>
        • <strong>Agent Alex</strong> (Pass: <code>agent123</code>) → Agent
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Apply theme if configured
        const activeTheme = localStorage.getItem('themePreference') || 'light';
        if (activeTheme === 'dark') { document.body.classList.add('dark-mode'); }

        // Seed default database if not initialized yet
        let userAccountsDB = JSON.parse(localStorage.getItem("appUsersDB"));
        if (!userAccountsDB) {
            userAccountsDB = {
                "Admin": { password: "admin123", role: "Superuser" },
                "Superuser": { password: "admin123", role: "Superuser" },
                "Supervisor": { password: "super123", role: "Supervisor" },
                "Agent Alex": { password: "agent123", role: "Agent" }
            };
            localStorage.setItem("appUsersDB", JSON.stringify(userAccountsDB));
        }

        // Redirect if session is already active
        if (sessionStorage.getItem("activeUser")) {
            window.location.href = "index.html";
        }
    });

    function handleLogin(event) {
        event.preventDefault();

        const errorBox = document.getElementById("errorAlert");
        errorBox.style.display = "none";

        const username = document.getElementById("usernameInput").value.trim();
        const password = document.getElementById("passwordInput").value;

        const userAccountsDB = JSON.parse(localStorage.getItem("appUsersDB")) || {};

        // Case-insensitive lookup matching for usernames
        const matchedKey = Object.keys(userAccountsDB).find(
            key => key.toLowerCase() === username.toLowerCase()
        );

        if (matchedKey) {
            const userRecord = userAccountsDB[matchedKey];

            // Verify password
            if (userRecord.password === password) {
                sessionStorage.setItem("activeUser", matchedKey);
                sessionStorage.setItem("activeRole", userRecord.role);
                window.location.href = "index.html";
                return;
            }
        }

        // If user is not found or password doesn't match
        errorBox.innerText = "Incorrect username or password.";
        errorBox.style.display = "block";
    }
</script>

</body>
</html>
