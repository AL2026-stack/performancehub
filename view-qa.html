<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Audit Breakdown View</title>
    <style>
        :root { 
            --primary: #e6007e; 
            --dark: #0f172a; 
            --light: #f4f7fa; 
            --border: #e2e8f0; 
            --success: #10b981; 
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body.dark-mode {
            --light: #0f172a;
            --dark: #f4f7fa;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--light); color: var(--text-main); padding: 2rem 1rem; transition: background 0.3s, color 0.3s; }
        
        .view-container { max-width: 750px; background: var(--card-bg); padding: 2.5rem; margin: 0 auto; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-wrap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        
        .score-banner { background: var(--dark); color: white; padding: 1.25rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .score-val { font-size: 2rem; font-weight: 800; color: var(--primary); }
        
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; background: var(--light); padding: 1rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.95rem; }
        
        .q-row { display: flex; justify-content: space-between; align-items: center; padding: 0.85rem 0; border-bottom: 1px dashed var(--border); font-size: 0.9rem; gap: 1rem; }
        
        .comments-box { background: var(--light); padding: 1rem; border-radius: 8px; margin-top: 1rem; font-style: italic; line-height: 1.5; color: #64748b; }
        .strategy-box { background: #f0fdf4; border-left: 4px solid var(--success); padding: 1rem; border-radius: 8px; margin-top: 1rem; line-height: 1.5; color: #065f46; }
        
        button { background: var(--dark); color: white; border: none; padding: 0.85rem; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 2rem; font-weight: 600; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="view-container">
    <div class="header-wrap">
        <h2 style="font-weight: 700; letter-spacing: -0.02em;">Quality Evaluation Review Report</h2>
    </div>

    <div class="score-banner">
        <span style="font-weight: 600; text-transform: uppercase; font-size: 0.85rem; color: #94a3b8;">Final Evaluated Score</span>
        <div class="score-val" id="scoreDisplay">--%</div>
    </div>

    <div class="meta-grid">
        <div><strong>Agent:</strong> <span id="agentDisplay">--</span></div>
        <div><strong>Evaluator:</strong> <span id="evaluatorDisplay">--</span></div>
        <div><strong>8x8 Call Ref:</strong> <span id="callRefDisplay">--</span></div>
        <div><strong>Zendesk Ticket Ref:</strong> <span id="ticketRefDisplay">--</span></div>
        <div><strong>Date Performed:</strong> <span id="dateDisplay">--</span></div>
        <div><strong>Status:</strong> <span id="statusDisplay">--</span></div>
    </div>

    <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 0.5rem;">Score Breakdown</h3>
    <div id="breakdownContainer"></div>

    <h3 style="margin-top: 2rem; font-size: 1.1rem; border-left: 4px solid var(--primary); padding-left: 0.5rem;">Coaching & Comments</h3>
    <div class="comments-box" id="commentsDisplay">"--"</div>

    <div id="strategySectionContainer" style="display:none;">
        <h3 style="margin-top: 2rem; font-size: 1.1rem; border-left: 4px solid var(--success); padding-left: 0.5rem;">Agent Alignment Commitment</h3>
        <div class="strategy-box" id="strategyDisplay"></div>
    </div>

    <button onclick="window.close()">Close Document View Window</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const activeTheme = localStorage.getItem('themePreference') || 'light';
        if (activeTheme === 'dark') { document.body.classList.add('dark-mode'); }

        const urlParams = new URLSearchParams(window.location.search);
        const docId = parseInt(urlParams.get('id'));

        const docs = JSON.parse(localStorage.getItem('feedbackDocs')) || [];
        const record = docs.find(d => d.id === docId);

        if (record) {
            document.getElementById("scoreDisplay").innerText = `${record.score}%`;
            document.getElementById("agentDisplay").innerText = record.agent;
            document.getElementById("evaluatorDisplay").innerText = record.evaluator || "Supervisor";
            document.getElementById("callRefDisplay").innerText = record.callRef || "N/A";
            document.getElementById("ticketRefDisplay").innerText = record.ticketRef || "N/A";
            document.getElementById("dateDisplay").innerText = record.date;
            document.getElementById("statusDisplay").innerText = record.status;
            document.getElementById("commentsDisplay").innerText = `"${record.comments}"`;

            if (record.agentCommitMessage) {
                document.getElementById("strategySectionContainer").style.display = "block";
                document.getElementById("strategyDisplay").innerText = `"${record.agentCommitMessage}"`;
            }

            const container = document.getElementById("breakdownContainer");
            container.innerHTML = "";

            const qMap = record.questionsMap || {};
            const txtMap = record.questionsTextMap || {};
            const totalKeys = Object.keys(qMap).length;

            for (let i = 1; i <= totalKeys; i++) {
                const text = txtMap[i] || `Question ${i}`;
                const points = qMap[i] !== undefined ? qMap[i] : "N/A";
                
                const row = document.createElement("div");
                row.className = "q-row";
                row.innerHTML = `<span><strong>Q${i}:</strong> ${text}</span><span style="font-weight:700; color:var(--primary); white-space:nowrap;">${points} / 4</span>`;
                container.appendChild(row);
            }
        } else {
            document.body.innerHTML = "<h3 style='padding:2rem; text-align:center;'>Error: Audit document profile not found.</h3>";
        }
    });
</script>
</body>
</html>
